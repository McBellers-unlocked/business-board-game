services:
  postgres:
    image: postgres:16
    container_name: dcl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dcl
      POSTGRES_PASSWORD: dcl_dev_password
      POSTGRES_DB: dcl
    ports:
      - "5432:5432"
    volumes:
      - ./.pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcl -d dcl"]
      interval: 5s
      timeout: 5s
      retries: 10
