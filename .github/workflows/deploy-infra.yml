name: Deploy infra (CDK)

# Infra changes are manual-trigger only to avoid accidental damage from
# arbitrary PR merges. Use the Actions tab → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      stacks:
        description: "Space-separated CDK stacks (blank = all)"
        required: false
        default: "dcl-backend dcl-frontend"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra
  cancel-in-progress: false   # never cancel an in-flight infra deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK deploy
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: "891612540396"
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          npx cdk deploy ${{ inputs.stacks }} \
            --require-approval never \
            --context enableCerts=true \
            --context apexDomain=business-board-game.com \
            --context apiDomain=api.business-board-game.com \
            --context cloudfrontCertArn=arn:aws:acm:us-east-1:891612540396:certificate/257f908d-26b9-4965-a949-b8fd6f6e887c \
            --context albCertArn=arn:aws:acm:eu-west-2:891612540396:certificate/adc3a4a2-7a93-4aed-859a-7a00328494f0
